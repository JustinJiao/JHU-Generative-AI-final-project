<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Escalation Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-links a {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .nav-links a.active {
            background: white;
            color: #667eea;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .message-input {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .message-input label {
            color: #667eea;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .add-message-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .add-message-btn:hover {
            background: #5568d3;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e7ff;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #c7d2fe;
        }

        .result-card {
            grid-column: 1 / -1;
        }

        .decision-result {
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .decision-escalate {
            background: #fee;
            border-left: 4px solid #ef4444;
        }

        .decision-no-escalate {
            background: #efe;
            border-left: 4px solid #10b981;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .decision-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge-escalate {
            background: #ef4444;
            color: white;
        }

        .badge-no-escalate {
            background: #10b981;
            color: white;
        }

        .confidence-score {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
        }

        .result-section {
            margin-bottom: 15px;
        }

        .result-section h3 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .result-section p {
            color: #555;
            line-height: 1.6;
        }

        .policy-citation {
            background: #f0f4ff;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
        }

        .policy-citation strong {
            color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .comparison-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .comparison-result {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .comparison-result h4 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .comparison-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Customer Support Escalation Assistant</h1>
        <p class="subtitle">AI-powered decision system for support case escalation</p>

        <div class="nav-links">
            <a href="/" class="active">📊 Batch Analysis</a>
            <a href="/static/monitor.html">🔍 Real-time Monitor</a>
            <a href="/static/demo.html">🎮 Interactive Demo</a>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Conversation</h2>
                <div id="messages-container"></div>
                <button class="add-message-btn" onclick="addMessage()">+ Add Message</button>
            </div>

            <div class="card">
                <h2>Case Metadata</h2>
                <div class="form-group">
                    <label for="case-id">Case ID</label>
                    <input type="text" id="case-id" placeholder="CASE-001" value="CASE-001">
                </div>
                <div class="form-group">
                    <label for="prior-contacts">Prior Contact Count</label>
                    <input type="number" id="prior-contacts" min="0" value="1">
                </div>
                <div class="form-group">
                    <label for="category">Initial Category</label>
                    <select id="category">
                        <option value="">-- Select --</option>
                        <option value="billing">Billing</option>
                        <option value="technical">Technical</option>
                        <option value="shipping">Shipping</option>
                        <option value="account">Account</option>
                        <option value="general">General</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="makeDecision('main')">Analyze Case</button>
                    <button class="btn-secondary" onclick="loadExample()">Load Example</button>
                </div>

                <div class="button-group" style="margin-top: 10px;">
                    <button class="btn-secondary" onclick="compareBaselines()">Compare All Methods</button>
                </div>
            </div>
        </div>

        <div class="card result-card" id="result-container" style="display: none;">
            <h2>Decision Result</h2>
            <div id="result-content"></div>
        </div>
    </div>

    <script>
        let messageCount = 0;

        function addMessage() {
            messageCount++;
            const container = document.getElementById('messages-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-input';
            messageDiv.innerHTML = `
                <label>Message ${messageCount}</label>
                <select class="msg-role" style="margin-bottom: 8px;">
                    <option value="customer">Customer</option>
                    <option value="agent">Agent</option>
                </select>
                <textarea class="msg-content" placeholder="Enter message content..."></textarea>
            `;
            container.appendChild(messageDiv);
        }

        function loadExample() {
            // Clear existing messages
            document.getElementById('messages-container').innerHTML = '';
            messageCount = 0;

            // Add example conversation
            const examples = [
                { role: 'customer', content: 'I was charged twice for my subscription.' },
                { role: 'agent', content: 'I apologize for the inconvenience. Can you provide your order number?' },
                { role: 'customer', content: 'This is my third time contacting support about this! Order #12345' }
            ];

            examples.forEach(msg => {
                messageCount++;
                const container = document.getElementById('messages-container');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message-input';
                messageDiv.innerHTML = `
                    <label>Message ${messageCount}</label>
                    <select class="msg-role" style="margin-bottom: 8px;">
                        <option value="customer" ${msg.role === 'customer' ? 'selected' : ''}>Customer</option>
                        <option value="agent" ${msg.role === 'agent' ? 'selected' : ''}>Agent</option>
                    </select>
                    <textarea class="msg-content" placeholder="Enter message content...">${msg.content}</textarea>
                `;
                container.appendChild(messageDiv);
            });

            document.getElementById('case-id').value = 'CASE-001';
            document.getElementById('prior-contacts').value = '3';
            document.getElementById('category').value = 'billing';
        }

        function collectInputData() {
            const messages = [];
            const roles = document.querySelectorAll('.msg-role');
            const contents = document.querySelectorAll('.msg-content');

            for (let i = 0; i < roles.length; i++) {
                if (contents[i].value.trim()) {
                    messages.push({
                        role: roles[i].value,
                        content: contents[i].value.trim()
                    });
                }
            }

            if (messages.length === 0) {
                alert('Please add at least one message');
                return null;
            }

            return {
                messages: messages,
                metadata: {
                    case_id: document.getElementById('case-id').value,
                    customer_id: 'CUST-' + Math.random().toString(36).substr(2, 9).toUpperCase(),
                    prior_contact_count: parseInt(document.getElementById('prior-contacts').value),
                    created_at: new Date().toISOString(),
                    initial_category: document.getElementById('category').value || null
                }
            };
        }

        async function makeDecision(endpoint = 'main') {
            const inputData = collectInputData();
            if (!inputData) return;

            const resultContainer = document.getElementById('result-container');
            const resultContent = document.getElementById('result-content');

            resultContainer.style.display = 'block';
            resultContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Analyzing case...</p></div>';

            try {
                const apiEndpoint = endpoint === 'main' ? '/api/decide' :
                                   endpoint === 'baseline1' ? '/api/baseline1' : '/api/baseline2';

                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(inputData)
                });

                if (!response.ok) throw new Error('API request failed');

                const result = await response.json();
                displayResult(result);
            } catch (error) {
                resultContent.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }

        function displayResult(result) {
            const isEscalate = result.decision === 'escalate';
            const resultClass = isEscalate ? 'decision-escalate' : 'decision-no-escalate';
            const badgeClass = isEscalate ? 'badge-escalate' : 'badge-no-escalate';

            let html = `
                <div class="decision-result ${resultClass}">
                    <div class="result-header">
                        <span class="decision-badge ${badgeClass}">${result.decision.replace('_', ' ')}</span>
                        <span class="confidence-score">Confidence: ${(result.confidence * 100).toFixed(0)}%</span>
                    </div>
            `;

            if (result.target_team) {
                html += `
                    <div class="result-section">
                        <h3>Target Team</h3>
                        <p><strong>${result.target_team}</strong></p>
                    </div>
                `;
            }

            html += `
                <div class="result-section">
                    <h3>Reasoning</h3>
                    <p>${result.reasoning}</p>
                </div>
            `;

            if (result.policy_citations && result.policy_citations.length > 0) {
                html += '<div class="result-section"><h3>Policy Citations</h3>';
                result.policy_citations.forEach(citation => {
                    html += `
                        <div class="policy-citation">
                            <strong>${citation.policy_id}</strong>: ${citation.rule_text}
                        </div>
                    `;
                });
                html += '</div>';
            }

            if (result.extracted_info) {
                html += `
                    <div class="result-section">
                        <h3>Extracted Information</h3>
                        <p><strong>Issue Type:</strong> ${result.extracted_info.issue_type || 'N/A'}</p>
                        <p><strong>Sentiment:</strong> ${result.extracted_info.sentiment || 'N/A'}</p>
                        <p><strong>Urgency:</strong> ${result.extracted_info.urgency || 'N/A'}</p>
                        ${result.extracted_info.keywords && result.extracted_info.keywords.length > 0 ?
                            `<p><strong>Keywords:</strong> ${result.extracted_info.keywords.join(', ')}</p>` : ''}
                    </div>
                `;
            }

            html += '</div>';
            document.getElementById('result-content').innerHTML = html;
        }

        async function compareBaselines() {
            const inputData = collectInputData();
            if (!inputData) return;

            const resultContainer = document.getElementById('result-container');
            const resultContent = document.getElementById('result-content');

            resultContainer.style.display = 'block';
            resultContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Running all three methods...</p></div>';

            try {
                const [mainResult, baseline1Result, baseline2Result] = await Promise.all([
                    fetch('/api/decide', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(inputData)
                    }).then(r => r.json()),
                    fetch('/api/baseline1', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(inputData)
                    }).then(r => r.json()),
                    fetch('/api/baseline2', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(inputData)
                    }).then(r => r.json())
                ]);

                displayComparison(mainResult, baseline1Result, baseline2Result);
            } catch (error) {
                resultContent.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }

        function displayComparison(main, baseline1, baseline2) {
            const html = `
                <h3 style="margin-bottom: 15px;">Comparison: All Three Methods</h3>
                <div class="comparison-container">
                    <div class="comparison-result">
                        <h4>LLM + Policy (Main)</h4>
                        <p><strong>Decision:</strong> ${main.decision}</p>
                        <p><strong>Team:</strong> ${main.target_team || 'None'}</p>
                        <p><strong>Confidence:</strong> ${(main.confidence * 100).toFixed(0)}%</p>
                        <p><strong>Policies:</strong> ${main.policy_citations.length}</p>
                    </div>
                    <div class="comparison-result">
                        <h4>Prompt-Only LLM</h4>
                        <p><strong>Decision:</strong> ${baseline1.decision}</p>
                        <p><strong>Team:</strong> ${baseline1.target_team || 'None'}</p>
                        <p><strong>Confidence:</strong> ${(baseline1.confidence * 100).toFixed(0)}%</p>
                        <p><strong>Policies:</strong> None</p>
                    </div>
                    <div class="comparison-result">
                        <h4>Keyword Rules</h4>
                        <p><strong>Decision:</strong> ${baseline2.decision}</p>
                        <p><strong>Team:</strong> ${baseline2.target_team || 'None'}</p>
                        <p><strong>Confidence:</strong> ${(baseline2.confidence * 100).toFixed(0)}%</p>
                        <p><strong>Policies:</strong> None</p>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 15px; background: #f0f4ff; border-radius: 8px;">
                    <h4 style="color: #667eea; margin-bottom: 10px;">Main System Reasoning:</h4>
                    <p>${main.reasoning}</p>
                </div>
            `;
            document.getElementById('result-content').innerHTML = html;
        }

        // Initialize with one message input
        window.onload = function() {
            addMessage();
        };
    </script>
</body>
</html>
